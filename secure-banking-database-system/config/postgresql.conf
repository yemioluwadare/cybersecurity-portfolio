# Enable logging for security monitoring
log_statement = 'all'
log_connections = on
log_disconnections = on
log_duration = on

# Set authentication timeout (prevents brute force attacks)
authentication_timeout = 30s

# Force SSL connections for encrypted communication
essl = on
ssl_cert_file = '/etc/ssl/certs/server.crt'
ssl_key_file = '/etc/ssl/private/server.key'

# Connection and memory optimisations
max_connections = 100
shared_buffers = 256MB
work_mem = 64MB

# Restrict remote connections to internal IPs only
listen_addresses = 'localhost,192.168.1.0/24'

# Prevent idle connections from lingering too long
idle_in_transaction_session_timeout = 60000  # 60 seconds
