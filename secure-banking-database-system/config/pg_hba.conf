# This file controls which users can connect to the database and from where

# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Allow local connections for the PostgreSQL superuser
local   all             postgres                                peer

# Allow password authentication for all users connecting from localhost
host    all             all             127.0.0.1/32            md5
host    all             all             ::1/128                 md5

# Allow specific IP ranges (Modify based on your network security policies)
host    all             all             192.168.1.0/24          md5

# Reject all other connections for security
host    all             all             0.0.0.0/0               reject