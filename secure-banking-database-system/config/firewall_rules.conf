# Firewall Rules Configuration (firewall_rules.conf)
# Restrict Database Access to Specific IPs

# Allow connections from the local network (Modify IP range as needed)
sudo ufw allow from 192.168.1.0/24 to any port 5432

# Allow connections from a specific trusted IP (Example: Admin workstation)
sudo ufw allow from 203.0.113.50 to any port 5432

# Deny all other incoming connections to PostgreSQL for security
sudo ufw deny 5432

# Enable UFW firewall (if not already enabled)
sudo ufw enable

# Check active firewall rules
sudo ufw status verbose
